<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>設定與校正 - Reading Trainer</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="css/styles.css">
</head>
<body class="settings-page">
    <header>
        <a href="index.html" class="header-title">ReadingTrainer</a>
        <a href="index.html" class="btn btn-secondary">返回目錄</a>
    </header>

    <main>
        <h1>設定與校正</h1>
        <p style="margin-bottom: 1.5rem;">為了確保測試結果的準確性，請依照下方指示進行螢幕校正與距離設定。</p>

        <form id="settings-form">
            <!-- 距離設定 -->
            <div class="settings-group">
                <label for="viewing-distance">觀看距離 (公分)</label>
                <input type="number" id="viewing-distance" min="30" max="300" value="60" required>
                <div class="help-text">請輸入受試者眼睛至螢幕的實際距離。預設為 60 公分。</div>
            </div>

            <!-- 螢幕校正 (類似 FrACT 的塑膠卡片校正) -->
            <div class="settings-group">
                <label>螢幕實體尺寸校正 (Plastic Card Calibration)</label>
                <div class="help-text">請拿出一張標準的塑膠卡片（例如：身分證、信用卡或健保卡，尺寸為 85.6mm × 53.98mm），輕靠在螢幕上的藍色方塊旁。請調整下方滑桿，直到螢幕上的藍色方塊大小與您的實體卡片完全一致。</div>
                
                <div class="calibration-area">
                    <!-- 校正方塊，使用 JavaScript 動態調整大小 -->
                    <div id="calibration-box" style="width: 250px; height: 157.65px;">
                        85.6mm x 53.98mm
                    </div>
                    
                    <div class="slider-container">
                        <label for="calibration-slider" style="font-size: 0.875rem; text-align: center;">調整大小</label>
                        <input type="range" id="calibration-slider" min="100" max="600" value="250">
                    </div>
                    <div class="help-text" style="margin-top: 1rem;">
                        目前推算像素密度: <span id="pixel-density-display">尚未儲存</span>
                    </div>
                </div>
            </div>

            <div style="text-align: right;">
                <button type="submit" class="btn">儲存設定</button>
            </div>
        </form>
    </main>

    <script src="js/app.js"></script>
</body>
</html>
